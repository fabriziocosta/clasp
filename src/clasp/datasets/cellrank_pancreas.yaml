name: cellrank_pancreas
input: data/cellrank-pancreas.h5ad
embedded: data/cellrank-pancreas-clasp.h5ad
batch_key: sample
label_key: clusters
source: https://cellrank.readthedocs.io/en/latest/api/_autosummary/datasets/cellrank.datasets.pancreas.html
paper_group: CellRank trajectory benchmark
download:
  kind: url
  filename: cellrank-pancreas.h5ad
  url: https://ndownloader.figshare.com/files/25060877
preprocess:
  normalize: false
  hvg_flavor: variance
  min_gene_counts: 0
  create_artificial_batch: true
graph:
  n_neighbors: 24
  intra_fraction: 0.5
  n_inter_edges: 3
  metric: euclidean
  assignment_quantile: 0.32
  hubness_correction: csls
  hubness_k: 12
  rank_correction: true
  edge_weighting: distance
  inter_edge_mode: assignment
  mutual_neighbors: true
  neighbor_mode: distance
  symmetrize: true
