name: cellrank_reprogramming_morris
input: data/cellrank-reprogramming-morris.h5ad
embedded: data/cellrank-reprogramming-morris-clasp.h5ad
batch_key: day
label_key: clusters
source: https://cellrank.readthedocs.io/en/latest/api/datasets.html
paper_group: CellRank trajectory benchmark
download:
  kind: url
  filename: cellrank-reprogramming-morris.h5ad
  url: https://ndownloader.figshare.com/files/25503773
  function: reprogramming_morris
preprocess:
  normalize: false
  hvg_flavor: variance
  min_gene_counts: 0
  create_artificial_batch: false
graph:
  n_neighbors: 20
  intra_fraction: 0.5
  n_inter_edges: 5
  assignment_quantile: 0.35
  hubness_correction: csls
  hubness_k: 10
  rank_correction: true
  edge_weighting: distance
  mutual_neighbors: false
  neighbor_mode: distance
  symmetrize: true
