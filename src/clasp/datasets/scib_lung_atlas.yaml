name: scib_lung_atlas
input: data/Lung_atlas_public.h5ad
embedded: data/Lung_atlas_public-clasp.h5ad
batch_key: batch
label_key: cell_type
source: https://figshare.com/articles/dataset/12420968
paper_group: scIB benchmark
download:
  kind: figshare
  filename: Lung_atlas_public.h5ad
  article_id: 12420968
  preferred_file: Lung_atlas_public.h5ad
preprocess:
  normalize: false
  hvg_flavor: variance
  min_gene_counts: 0
  create_artificial_batch: false
graph:
  n_neighbors: 20
  intra_fraction: 0.5
  n_inter_edges: 5
  assignment_quantile: 0.35
  hubness_correction: csls
  hubness_k: 10
  rank_correction: true
  edge_weighting: distance
  mutual_neighbors: false
  neighbor_mode: distance
  symmetrize: true
