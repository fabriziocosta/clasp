name: zebrafish
input: data/cellrank-zebrafish.h5ad
embedded: data/cellrank-zebrafish-clasp.h5ad
batch_key: Stage
label_key: lineages
source: https://cellrank.readthedocs.io/en/latest/api/_autosummary/datasets/cellrank.datasets.zebrafish.html
paper_group: development/time series
download:
  kind: url
  filename: cellrank-zebrafish.h5ad
  url: https://ndownloader.figshare.com/files/27265280
preprocess:
  normalize: false
  hvg_flavor: variance
  create_artificial_batch: false
graph:
  n_neighbors: 24
  intra_fraction: 0.5
  n_inter_edges: 3
  metric: euclidean
  assignment_quantile: 0.32
  hubness_correction: csls
  hubness_k: 12
  rank_correction: true
  edge_weighting: distance
  inter_edge_mode: assignment
  mutual_neighbors: true
  neighbor_mode: distance
  symmetrize: true
